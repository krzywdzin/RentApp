<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none" stroke="#a1a1aa" stroke-width="3">
  <!-- Rear view: taillights, bumper, trunk outline -->
  <!-- Body outline -->
  <path d="M200 550 L200 400 Q200 350 250 320 L350 280 Q400 200 500 180 Q600 200 650 280 L750 320 Q800 350 800 400 L800 550 Q800 600 780 650 L780 750 Q780 800 750 800 L250 800 Q220 800 220 750 L220 650 Q200 600 200 550 Z" />
  <!-- Rear window -->
  <path d="M350 280 Q500 250 650 280 L620 200 Q500 170 380 200 Z" />
  <!-- Left taillight -->
  <rect x="220" y="420" width="80" height="50" rx="8" />
  <!-- Right taillight -->
  <rect x="700" y="420" width="80" height="50" rx="8" />
  <!-- Trunk lid -->
  <path d="M300 320 Q500 300 700 320 L700 480 Q500 500 300 480 Z" stroke-dasharray="6,3" />
  <!-- Rear bumper -->
  <path d="M250 650 L750 650 Q770 650 770 680 L770 750 Q770 780 750 780 L250 780 Q230 780 230 750 L230 680 Q230 650 250 650 Z" />
  <!-- License plate area -->
  <rect x="400" y="680" width="200" height="50" rx="5" />
  <!-- Exhaust pipes -->
  <ellipse cx="320" cy="770" rx="25" ry="15" />
  <ellipse cx="680" cy="770" rx="25" ry="15" />
  <!-- Rear center line -->
  <line x1="500" y1="500" x2="500" y2="650" stroke-dasharray="8,4" />
</svg>
